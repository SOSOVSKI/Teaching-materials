[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "symbolic-fem-workbench"
version = "0.1.0"
description = "Teaching-first symbolic finite element workbench built on SymPy"
readme = "README.md"
# Relaxed from the source repo's ">=3.11,<3.12": that upper cap only existed
# for the conda-managed FEniCSx 0.9.0 stack, which this package never imports.
# The code runs on 3.12 (the monorepo's interpreter).
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Shmuel Osovski", email = "osovski.technion@gmail.com" },
]
keywords = ["finite-element", "symbolic", "sympy", "teaching", "fem"]
dependencies = [
    "sympy>=1.13",
    "numpy>=1.26",
    "matplotlib>=3.8",
    "scipy>=1.12",
    "pyyaml>=6.0",
    # Notebook stack is mandatory so the companion notebooks run out of the box
    # (no extras to remember). ui.py uses ipywidgets for its interactive panels.
    "jupyter>=1.0",
    "ipywidgets>=8.0",
    "ipykernel>=6.29",
]

# NOTE: a few notebooks additionally use the FEniCSx stack (fenics-dolfinx,
# mpich, pyvista), which is conda-only (not on PyPI) — install via conda-forge.
# It is intentionally not a dependency here.

[tool.hatch.build.targets.wheel]
packages = ["src/symbolic_fem_workbench"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
